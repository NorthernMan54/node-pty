name: Prebuilds

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prebuilds
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win32-x64
            runner: windows-2022
            arch: x64
          - platform: win32-arm64
            runner: windows-11-arm
            arch: arm64
          - platform: darwin-x64
            runner: macos-15-intel
            arch: x64
          - platform: darwin-arm64
            runner: macos-15
            arch: arm64
          - platform: linux-x64
            runner: ubuntu-22.04
            arch: x64
          - platform: linux-arm64
            runner: ubuntu-22.04-arm
            arch: arm64
          - platform: linux-arm
            runner: ubuntu-22.04
            arch: arm
            crossCompile: true
          - platform: linux-ia32
            runner: ubuntu-22.04
            arch: ia32
            crossCompile: true
          - platform: linux-musl-x64
            runner: ubuntu-22.04
            arch: x64
            musl: true
          - platform: linux-musl-arm64
            runner: ubuntu-22.04
            arch: arm64
            musl: true
          - platform: linux-musl-arm
            runner: ubuntu-22.04
            arch: arm
            musl: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install sysroot (Linux x64/arm64)
        if: runner.os == 'Linux' && !matrix.crossCompile && !matrix.musl
        run: |
          set -eo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y gcc-10 g++-10
          echo "CC=gcc-10" >> $GITHUB_ENV
          echo "CXX=g++-10" >> $GITHUB_ENV
          SYSROOT_PATH=$(node scripts/linux/install-sysroot.js ${{ matrix.arch }} | grep "SYSROOT_PATH=" | cut -d= -f2)
          echo "SYSROOT_PATH=$SYSROOT_PATH" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross-compiler (Linux arm)
        if: matrix.crossCompile && matrix.arch == 'arm'
        run: |
          set -eo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          echo "CC=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CXX=arm-linux-gnueabihf-g++" >> $GITHUB_ENV

      - name: Install cross-compiler (Linux ia32)
        if: matrix.crossCompile && matrix.arch == 'ia32'
        run: |
          set -eo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib g++-multilib
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Configure compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Set up QEMU (musl arm/arm64)
        if: matrix.musl && matrix.arch != 'x64'
        uses: docker/setup-qemu-action@v3

      - name: Build in Alpine/musl container
        if: matrix.musl
        run: |
          case "${{ matrix.arch }}" in
            x64)   PLATFORM="linux/amd64" ;;
            arm64) PLATFORM="linux/arm64" ;;
            arm)   PLATFORM="linux/arm/v7" ;;
          esac
          docker run --rm \
            --platform "$PLATFORM" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e ARCH=${{ matrix.arch }} \
            -e npm_config_arch=${{ matrix.arch }} \
            node:22-alpine sh -c "
              set -e
              apk add --no-cache python3 make g++ linux-headers
              npm ci
            "

      - name: Install dependencies and build
        if: '!matrix.musl'
        run: npm ci
        env:
          ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}
          CC: ${{ env.CC }}
          CXX: ${{ env.CXX }}
          SYSROOT_PATH: ${{ env.SYSROOT_PATH }}

      - name: Verify GLIBC requirements (Linux)
        if: runner.os == 'Linux' && !matrix.crossCompile && !matrix.musl
        run: |
          EXPECTED_GLIBC_VERSION="2.28" \
          EXPECTED_GLIBCXX_VERSION="3.4.25" \
          SEARCH_PATH="build" \
          ./scripts/linux/verify-glibc-requirements.sh

      - name: Make spawn-helper executable (macOS/Linux)
        if: runner.os != 'Windows' && !matrix.musl
        run: chmod +x build/Release/spawn-helper || true

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.platform }}
          path: build/Release/
          retention-days: 7

  test:
    name: Test (${{ matrix.platform }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win32-x64
            runner: windows-2022
          - platform: darwin-arm64
            runner: macos-14
          - platform: linux-x64
            runner: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Download prebuild for this platform
        uses: actions/download-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}
          path: build/Release/

      - name: Make spawn-helper executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x build/Release/spawn-helper || true

      - name: Install dependencies (skip native build)
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        if: matrix.platform == 'linux-x64'
        run: npm run lint

  archive:
    name: Archive prebuilds
    needs: [build, test]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: prebuilds-staging

      - name: Restructure into prebuilds/ layout
        run: |
          mkdir -p prebuilds
          for dir in prebuilds-staging/prebuild-*/; do
            platform=$(basename "$dir" | sed 's/^prebuild-//')
            mkdir -p "prebuilds/$platform"
            cp -r "$dir"* "prebuilds/$platform/"
          done
          echo "Prebuild contents:"
          find prebuilds -type f

      - name: Upload combined prebuilds artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ github.sha }}
          path: prebuilds/
          retention-days: 30
